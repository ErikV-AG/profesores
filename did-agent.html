<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-ID Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #did-agent-container { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div id="did-agent-container"></div>

  <script
    type="module"
    src="https://agent.d-id.com/v2/index.js"
    data-mode="full"
    data-client-key="Z29vZ2xlLW9hdXRoMnwxMTgyODc4NjM3MDQwODcyOTIzNTI6dXlUbGxjbDJuWlhWY003OUh3cDA0"
    data-agent-id="v2_agt_VRr-daUT"
    data-name="did-agent"
    data-monitor="true"
    data-target-id="did-agent-container">
  </script>

  <script>
    const TRADUCCIONES = {
      'Start conversation': 'Iniciar',
      'Connecting':         'Conectando...',
      'Initializing':       'Iniciando...',
      'Type your message':  'Escribe tu mensaje',
      'Send':               'Enviar',
      'End':                'Terminar',
      'Microphone':         'Micrófono',
      'Mute':               'Silenciar',
      'Unmute':             'Activar audio',
      'Chat':               'Chat',
      'Reconnecting':       'Reconectando...',
      'Something went wrong': 'Algo salió mal',
      'Try again':          'Intentar de nuevo',
      'Loading':            'Cargando...',
      'Close':              'Cerrar',
    };

    function traducirRoot(root) {
      if (!root) return;

      // Reemplaza texto en todos los nodos
      root.querySelectorAll && root.querySelectorAll('*').forEach(el => {
        // Texto directo del elemento (no hijos)
        el.childNodes.forEach(child => {
          if (child.nodeType === Node.TEXT_NODE) {
            const txt = child.textContent.trim();
            if (TRADUCCIONES[txt]) child.textContent = TRADUCCIONES[txt];
          }
        });
        // Placeholder
        if (el.placeholder && TRADUCCIONES[el.placeholder]) {
          el.placeholder = TRADUCCIONES[el.placeholder];
        }
        // aria-label
        const label = el.getAttribute && el.getAttribute('aria-label');
        if (label && TRADUCCIONES[label]) el.setAttribute('aria-label', TRADUCCIONES[label]);
      });

      // Entra en shadow roots
      root.querySelectorAll && root.querySelectorAll('*').forEach(el => {
        if (el.shadowRoot) traducirRoot(el.shadowRoot);
      });
    }

    // Ejecuta la traducción cada 500ms durante los primeros 10 segundos
    // Cubre: carga inicial, connecting, initializing, y apertura del chat
    let intentos = 0;
    const MAX = 20; // 20 x 500ms = 10 segundos
    const intervalo = setInterval(() => {
      traducirRoot(document.body);
      if (++intentos >= MAX) clearInterval(intervalo);
    }, 500);
  </script>

</body>
</html>
