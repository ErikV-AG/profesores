<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-ID Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    /* El agente D-ID se inyecta como widget flotante,
       este contenedor le da un punto de anclaje */
    #did-agent-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
  </style>
</head>
<body>

  <div id="did-agent-container"></div>

  <!-- Script del agente D-ID -->
  <script
    type="module"
    src="https://agent.d-id.com/v2/index.js"
    data-mode="full"
    data-client-key="Z29vZ2xlLW9hdXRoMnwxMTgyODc4NjM3MDQwODcyOTIzNTI6dXlUbGxjbDJuWlhWY003OUh3cDA0"
    data-agent-id="vv2_agt_TWSn-Kb3"
    data-name="did-agent"
    data-monitor="true"
    data-target-id="did-agent-container">
  </script>

  <!-- Auto-open: simula clic en el botón del agente cuando carga -->
  <script>
    function tryOpenAgent(attempts) {
      if (attempts <= 0) return;

      // D-ID inyecta un <did-agent> custom element con un botón interno
      const agent = document.querySelector('did-agent');
      if (agent && agent.shadowRoot) {
        const btn = agent.shadowRoot.querySelector('button, [role="button"], .agent-button, .launcher');
        if (btn) {
          btn.click();
          return;
        }
      }
      // Reintenta cada 500ms hasta encontrar el botón
      setTimeout(() => tryOpenAgent(attempts - 1), 500);
    }

    window.addEventListener('load', () => {
      setTimeout(() => tryOpenAgent(20), 1000);
    });
  </script>

</body>
</html>
