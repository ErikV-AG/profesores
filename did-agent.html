<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-ID Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #did-agent-container { width: 100%; height: 100%; }

    #btn-terminar {
      position: fixed;
      top: 10px;
      left: 14px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    #btn-terminar:hover { opacity: 1; }
  </style>
</head>
<body>

  <div id="did-agent-container"></div>
  <button id="btn-terminar" title="Terminar conversación">✕ Terminar</button>

  <script
    type="module"
    src="https://agent.d-id.com/v2/index.js"
    data-mode="full"
    data-client-key="Z29vZ2xlLW9hdXRoMnwxMTgyODc4NjM3MDQwODcyOTIzNTI6dXlUbGxjbDJuWlhWY003OUh3cDA0"
    data-agent-id="v2_agt_VRr-daUT"
    data-name="did-agent"
    data-monitor="true"
    data-target-id="did-agent-container">
  </script>

  <script>
    // Botón terminar
    document.getElementById('btn-terminar').addEventListener('click', () => {
      const agent = document.querySelector('did-agent');
      if (agent && agent.disconnect) agent.disconnect();
      location.reload();
    });

    // Traducciones — busca en shadow DOMs recursivamente
    function traducir(root) {
      if (!root || !root.querySelectorAll) return;

      // Inputs: placeholder
      root.querySelectorAll('input, textarea').forEach(el => {
        const ph = el.getAttribute('placeholder') || '';
        if (ph.toLowerCase().includes('type your message')) {
          el.setAttribute('placeholder', 'Escribe tu mensaje...');
        }
      });

      // Botones: texto exacto
      root.querySelectorAll('button, [role="button"]').forEach(el => {
        el.childNodes.forEach(n => {
          if (n.nodeType === Node.TEXT_NODE) {
            const txt = n.textContent.trim().toLowerCase();
            if (txt === 'start conversation') n.textContent = 'Iniciar';
          }
        });
      });

      // Entra en cada shadow root
      root.querySelectorAll('*').forEach(el => {
        if (el.shadowRoot) traducir(el.shadowRoot);
      });
    }

    // Ejecuta cada 500ms durante 30 segundos
    let i = 60;
    const t = setInterval(() => {
      traducir(document.body);
      if (!--i) clearInterval(t);
    }, 500);

    // También re-traduce tras cada clic
    document.addEventListener('click', () => {
      setTimeout(() => traducir(document.body), 400);
    });
  </script>

</body>
</html>
