<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-ID Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    /* El agente D-ID se inyecta como widget flotante,
       este contenedor le da un punto de anclaje */
    #did-agent-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
  </style>
</head>
<body>

  <div id="did-agent-container"></div>

  <!-- Script del agente D-ID -->
  <script
    type="module"
    src="https://agent.d-id.com/v2/index.js"
    data-mode="full"
    data-client-key="Z29vZ2xlLW9hdXRoMnwxMTgyODc4NjM3MDQwODcyOTIzNTI6dXlUbGxjbDJuWlhWY003OUh3cDA0"
    data-agent-id="v2_agt_VRr-daUT"
    data-name="did-agent"
    data-monitor="true"
    data-target-id="did-agent-container">
  </script>

  <!-- Auto-open y traducción del botón "Start conversation" -->
  <script>
    const TEXTO_ORIGINAL = 'Start conversation';
    const TEXTO_ESPAÑOL  = 'Iniciar conversación';

    // Busca el botón en el DOM normal y en Shadow DOMs
    function findStartButton(root) {
      // Busca en Shadow DOM si existe
      const shadow = root.shadowRoot;
      if (shadow) {
        const found = findStartButton(shadow);
        if (found) return found;
      }
      // Busca botones cuyo texto coincida
      const btns = root.querySelectorAll('button, [role="button"]');
      for (const btn of btns) {
        if (btn.textContent.trim().toLowerCase().includes('start conversation')) {
          return btn;
        }
      }
      // Busca en hijos con shadow root
      for (const el of root.querySelectorAll('*')) {
        if (el.shadowRoot) {
          const found = findStartButton(el.shadowRoot);
          if (found) return found;
        }
      }
      return null;
    }

    function tryAutoStart(attempts) {
      if (attempts <= 0) return;

      const btn = findStartButton(document);
      if (btn) {
        // Cambia el texto a español
        btn.childNodes.forEach(node => {
          if (node.nodeType === Node.TEXT_NODE) {
            node.textContent = node.textContent.replace(TEXTO_ORIGINAL, TEXTO_ESPAÑOL);
          }
        });
        if (btn.textContent.trim() === TEXTO_ORIGINAL) {
          btn.textContent = TEXTO_ESPAÑOL;
        }
        // Hace clic automático
        btn.click();
        return;
      }

      setTimeout(() => tryAutoStart(attempts - 1), 500);
    }

    // También observa cambios en el DOM para traducir si el botón aparece después
    const observer = new MutationObserver(() => {
      const btn = findStartButton(document);
      if (btn && btn.textContent.trim().toLowerCase().includes('start conversation')) {
        btn.textContent = TEXTO_ESPAÑOL;
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });

    window.addEventListener('load', () => {
      setTimeout(() => tryAutoStart(20), 1500);
    });
  </script>

</body>
</html>
