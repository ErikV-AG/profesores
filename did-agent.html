<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-ID Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #did-agent-container { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div id="did-agent-container"></div>

  <script
    type="module"
    src="https://agent.d-id.com/v2/index.js"
    data-mode="full"
    data-client-key="Z29vZ2xlLW9hdXRoMnwxMTgyODc4NjM3MDQwODcyOTIzNTI6dXlUbGxjbDJuWlhWY003OUh3cDA0"
    data-agent-id="v2_agt_VRr-daUT"
    data-name="did-agent"
    data-monitor="true"
    data-target-id="did-agent-container">
  </script>

  <script>
    const TRADUCCIONES = {
      'start conversation':     'Iniciar',
      'connecting':             'Conectando...',
      'type your message here': 'Escribe tu mensaje aquí',
      'type your message':      'Escribe tu mensaje',
      'send':                   'Enviar',
      'end conversation':       'Terminar conversación',
      'end':                    'Terminar',
      'microphone':             'Micrófono',
      'mute':                   'Silenciar',
      'unmute':                 'Activar audio',
      'chat':                   'Chat',
      'reconnecting':           'Reconectando...',
      'something went wrong':   'Algo salió mal',
      'try again':              'Intentar de nuevo',
      'loading':                'Cargando...',
      'close':                  'Cerrar',
      'open chat':              'Abrir chat',
    };

    // Traduce un árbol incluyendo todos sus Shadow DOMs
    function traducirArbol(root) {
      if (!root) return;

      // Nodos de texto
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      let n;
      while ((n = walker.nextNode())) {
        const lower = n.textContent.trim().toLowerCase();
        for (const [en, es] of Object.entries(TRADUCCIONES)) {
          if (lower === en) { n.textContent = es; break; }
        }
      }

      if (!root.querySelectorAll) return;

      // Placeholders
      root.querySelectorAll('[placeholder]').forEach(el => {
        const lower = el.placeholder.toLowerCase();
        for (const [en, es] of Object.entries(TRADUCCIONES)) {
          if (lower.includes(en)) { el.placeholder = es; break; }
        }
      });

      // aria-labels
      root.querySelectorAll('[aria-label]').forEach(el => {
        const lower = el.getAttribute('aria-label').toLowerCase();
        for (const [en, es] of Object.entries(TRADUCCIONES)) {
          if (lower.includes(en)) { el.setAttribute('aria-label', es); break; }
        }
      });

      // Entra recursivamente en cada Shadow DOM
      root.querySelectorAll('*').forEach(el => {
        if (el.shadowRoot) {
          traducirArbol(el.shadowRoot);
          // Observa cambios dentro de este shadow root también
          new MutationObserver(() => traducirArbol(el.shadowRoot))
            .observe(el.shadowRoot, { childList: true, subtree: true, characterData: true });
        }
      });
    }

    // Observa el body principal y reintenta cada segundo
    window.addEventListener('load', () => {
      traducirArbol(document.body);

      new MutationObserver(() => traducirArbol(document.body))
        .observe(document.body, { childList: true, subtree: true });

      let i = 20;
      const t = setInterval(() => {
        traducirArbol(document.body);
        if (!--i) clearInterval(t);
      }, 1000);
    });
  </script>

</body>
</html>
