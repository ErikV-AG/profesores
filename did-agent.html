<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-ID Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
    #did-agent-container { width: 100%; height: 100%; position: relative; }
  </style>
</head>
<body>

  <div id="did-agent-container"></div>

  <script
    type="module"
    src="https://agent.d-id.com/v2/index.js"
    data-mode="full"
    data-client-key="Z29vZ2xlLW9hdXRoMnwxMTgyODc4NjM3MDQwODcyOTIzNTI6dXlUbGxjbDJuWlhWY003OUh3cDA0"
    data-agent-id="v2_agt_VRr-daUT"
    data-name="did-agent"
    data-monitor="true"
    data-target-id="did-agent-container">
  </script>

  <script>
    const TRADUCCIONES = {
      'start conversation':     'Iniciar',
      'connecting':             'Conectando...',
      'type your message here': 'Escribe tu mensaje aquí',
      'type your message':      'Escribe tu mensaje',
      'send':                   'Enviar',
      'end conversation':       'Terminar conversación',
      'end':                    'Terminar',
      'microphone':             'Micrófono',
      'mute':                   'Silenciar',
      'unmute':                 'Activar audio',
      'chat':                   'Chat',
      'reconnecting':           'Reconectando...',
      'something went wrong':   'Algo salió mal',
      'try again':              'Intentar de nuevo',
      'loading':                'Cargando...',
      'close':                  'Cerrar',
      'open chat':              'Abrir chat',
    };

    function traducirTexto(texto) {
      const lower = texto.trim().toLowerCase();
      for (const [en, es] of Object.entries(TRADUCCIONES)) {
        if (lower === en) return es;
      }
      let resultado = texto;
      for (const [en, es] of Object.entries(TRADUCCIONES)) {
        if (lower.includes(en)) resultado = resultado.replace(new RegExp(en, 'gi'), es);
      }
      return resultado;
    }

    function traducirArbol(root) {
      if (!root) return;
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      let nodo;
      while ((nodo = walker.nextNode())) {
        const t = traducirTexto(nodo.textContent);
        if (t !== nodo.textContent) nodo.textContent = t;
      }
      if (root.querySelectorAll) {
        root.querySelectorAll('input[placeholder], textarea[placeholder]').forEach(el => {
          el.setAttribute('placeholder', traducirTexto(el.getAttribute('placeholder')));
        });
        root.querySelectorAll('[aria-label]').forEach(el => {
          el.setAttribute('aria-label', traducirTexto(el.getAttribute('aria-label')));
        });
        root.querySelectorAll('*').forEach(el => {
          if (el.shadowRoot) traducirArbol(el.shadowRoot);
        });
      }
    }

    window.addEventListener('load', () => {
      traducirArbol(document.body);
      new MutationObserver(() => traducirArbol(document.body))
        .observe(document.body, { childList: true, subtree: true, characterData: true });
      let i = 20;
      const t = setInterval(() => { traducirArbol(document.body); if (!--i) clearInterval(t); }, 1000);
    });

    window.addEventListener('beforeunload', () => {
      const a = document.querySelector('did-agent');
      if (a && a.disconnect) a.disconnect();
    });
  </script>

</body>
</html>
