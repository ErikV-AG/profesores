<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-ID Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #did-agent-container { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div id="did-agent-container"></div>

  <script
    type="module"
    src="https://agent.d-id.com/v2/index.js"
    data-mode="full"
    data-client-key="Z29vZ2xlLW9hdXRoMnwxMTgyODc4NjM3MDQwODcyOTIzNTI6dXlUbGxjbDJuWlhWY003OUh3cDA0"
    data-agent-id="v2_agt_VRr-daUT"
    data-name="did-agent"
    data-monitor="true"
    data-target-id="did-agent-container">
  </script>

  <script>
    const TRADUCCIONES = {
      'start conversation':     'Iniciar',
      'connecting':             'Conectando...',
      'type your message here': 'Escribe tu mensaje aquí',
      'type your message':      'Escribe tu mensaje',
      'send':                   'Enviar',
      'end conversation':       'Terminar conversación',
      'end':                    'Terminar',
      'microphone':             'Micrófono',
      'mute':                   'Silenciar',
      'unmute':                 'Activar audio',
      'chat':                   'Chat',
      'reconnecting':           'Reconectando...',
      'something went wrong':   'Algo salió mal',
      'try again':              'Intentar de nuevo',
      'loading':                'Cargando...',
      'close':                  'Cerrar',
      'open chat':              'Abrir chat',
    };

    // Rastreo de shadow roots ya observados para no duplicar observers
    const observados = new WeakSet();

    function traducirNodos(root) {
      if (!root) return;

      // Traduce nodos de texto
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      let n;
      while ((n = walker.nextNode())) {
        const lower = n.textContent.trim().toLowerCase();
        for (const [en, es] of Object.entries(TRADUCCIONES)) {
          if (lower === en) { n.textContent = es; break; }
        }
      }

      if (!root.querySelectorAll) return;

      // Placeholders
      root.querySelectorAll('[placeholder]').forEach(el => {
        const lower = el.placeholder.toLowerCase();
        for (const [en, es] of Object.entries(TRADUCCIONES)) {
          if (lower.includes(en)) { el.placeholder = es; break; }
        }
      });

      // aria-labels
      root.querySelectorAll('[aria-label]').forEach(el => {
        const lower = el.getAttribute('aria-label').toLowerCase();
        for (const [en, es] of Object.entries(TRADUCCIONES)) {
          if (lower.includes(en)) { el.setAttribute('aria-label', es); break; }
        }
      });
    }

    // Registra observer en un shadow root solo si no lo hemos observado antes
    function observarShadow(shadowRoot) {
      if (observados.has(shadowRoot)) return;
      observados.add(shadowRoot);
      new MutationObserver(() => {
        traducirNodos(shadowRoot);
        registrarShadows(shadowRoot); // busca nuevos shadow roots dentro
      }).observe(shadowRoot, { childList: true, subtree: true, characterData: true });
    }

    // Recorre el árbol buscando shadow roots nuevos
    function registrarShadows(root) {
      if (!root || !root.querySelectorAll) return;
      root.querySelectorAll('*').forEach(el => {
        if (el.shadowRoot) {
          traducirNodos(el.shadowRoot);
          observarShadow(el.shadowRoot);
          registrarShadows(el.shadowRoot);
        }
      });
    }

    window.addEventListener('load', () => {
      traducirNodos(document.body);
      registrarShadows(document.body);

      // Observer del body principal (solo detecta nuevos elementos, no recursivo)
      new MutationObserver(() => {
        registrarShadows(document.body);
      }).observe(document.body, { childList: true, subtree: true });

      // Reintenta durante 15s por si el widget tarda
      let i = 15;
      const t = setInterval(() => {
        traducirNodos(document.body);
        registrarShadows(document.body);
        if (!--i) clearInterval(t);
      }, 1000);
    });
  </script>

</body>
</html>
