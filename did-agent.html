<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-ID Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #did-agent-container { width: 100%; height: 100%; }

    #btn-terminar {
      position: fixed;
      top: 10px;
      right: 14px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    #btn-terminar:hover { opacity: 1; }
  </style>
</head>
<body>

  <div id="did-agent-container"></div>

  <!-- Botón discreto para terminar la conversación -->
  <button id="btn-terminar" title="Terminar conversación">✕ Terminar</button>

  <script
    type="module"
    src="https://agent.d-id.com/v2/index.js"
    data-mode="full"
    data-client-key="Z29vZ2xlLW9hdXRoMnwxMTgyODc4NjM3MDQwODcyOTIzNTI6dXlUbGxjbDJuWlhWY003OUh3cDA0"
    data-agent-id="v2_agt_VRr-daUT"
    data-name="did-agent"
    data-monitor="true"
    data-target-id="did-agent-container">
  </script>

  <script>
    // Botón terminar — busca y hace clic en el botón de end del widget
    document.getElementById('btn-terminar').addEventListener('click', () => {
      // Intenta encontrar el botón "End" dentro del shadow DOM de D-ID
      function encontrarEnd(root) {
        if (!root) return null;
        if (root.querySelectorAll) {
          const btns = root.querySelectorAll('button, [role="button"]');
          for (const btn of btns) {
            const txt = btn.textContent.trim().toLowerCase();
            if (txt === 'end' || txt === 'terminar' || txt.includes('end conversation')) {
              return btn;
            }
          }
          for (const el of root.querySelectorAll('*')) {
            if (el.shadowRoot) {
              const found = encontrarEnd(el.shadowRoot);
              if (found) return found;
            }
          }
        }
        return null;
      }

      const endBtn = encontrarEnd(document.body);
      if (endBtn) {
        endBtn.click();
      } else {
        // Si no encontró el botón interno, desconecta el agente directamente
        const agent = document.querySelector('did-agent');
        if (agent && agent.disconnect) agent.disconnect();
        // Y recarga para empezar de nuevo
        location.reload();
      }
    });

    // Traducciones: placeholder e inicio
    function traducir(root) {
      if (!root) return;
      if (root.querySelectorAll) {
        root.querySelectorAll('input, textarea').forEach(el => {
          const ph = el.getAttribute('placeholder') || '';
          if (ph.toLowerCase().includes('type your message')) {
            el.setAttribute('placeholder', 'Escribe tu mensaje...');
          }
        });
        root.querySelectorAll('button, [role="button"]').forEach(el => {
          el.childNodes.forEach(n => {
            if (n.nodeType === Node.TEXT_NODE &&
                n.textContent.trim().toLowerCase() === 'start conversation') {
              n.textContent = 'Iniciar';
            }
          });
        });
        root.querySelectorAll('*').forEach(el => {
          if (el.shadowRoot) traducir(el.shadowRoot);
        });
      }
    }

    let i = 30;
    const t = setInterval(() => { traducir(document.body); if (!--i) clearInterval(t); }, 500);
  </script>

</body>
</html>
